<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дмитро & Іванна — Весілля</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; background: #000; }

    /* ── Full-screen photo section ───────────────────────────────── */
    .photo-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
    }

    .photo-screen img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── Scroll cue ──────────────────────────────────────────────── */
    @keyframes bounce-cue {
      0%, 100% { transform: translate(-50%, 0);   opacity: 0.6; }
      50%       { transform: translate(-50%, 9px); opacity: 1;   }
    }
    .scroll-cue {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      cursor: pointer;
      animation: bounce-cue 2.2s ease-in-out infinite;
    }

    /* ══════════════  TIMING SECTION  ════════════════════════════════ */
    #timing {
      background: #737373;
      color: #fff;
      padding: 64px 24px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Josefin Sans', sans-serif;
    }

    /* Date header */
    .timing-date {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      letter-spacing: 0.3em;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    /* "TIMING" title */
    .timing-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    /* Timeline container */
    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 56px;
      max-width: 480px;
      width: 100%;
    }

    /* Vertical line */
    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: calc(50% + 60px);
      width: 1px;
      background: rgba(255,255,255,0.3);
    }

    @media (max-width: 480px) {
      .timeline::before {
        right: auto;
        left: 48px;
      }
    }

    /* Single event */
    .event {
      text-align: center;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .event.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .event-time {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(2.6rem, 9vw, 3.6rem);
      line-height: 1;
      margin-bottom: 6px;
      position: relative;
      display: inline-block;
    }

    /* Bracket lines around time */
    .event-time::before {
      content: '';
      position: absolute;
      right: -16px;
      top: 0;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.5);
    }
    .event-time::after {
      content: '';
      position: absolute;
      right: -16px;
      bottom: 0;
      width: 12px;
      height: 1px;
      background: rgba(255,255,255,0.5);
    }

    .event-name {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 2.8vw, 1rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .event-address-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .event-address {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 2.2vw, 0.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1.6;
    }

    .event-address a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      transition: border-color 0.3s;
    }
    .event-address a:hover {
      border-color: #fff;
    }

    /* Divider between events */
    .event-divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 0 auto;
    }

    /* Bottom quote */
    .timing-quote {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
      margin-top: 64px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .timing-quote.visible {
      opacity: 0.85;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- ═══════════  PHOTO 1  ═══════════ -->
  <section id="hero" class="photo-screen">
    <img src="img/hero-bg.jpg" alt="Весільне фото" loading="eager" fetchpriority="high" />
    <div class="scroll-cue" onclick="document.getElementById('photo2').scrollIntoView({behavior:'smooth'})">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </section>

  <!-- ═══════════  PHOTO 2  ═══════════ -->
  <section id="photo2" class="photo-screen">
    <img src="img/hero-bg2.jpg" alt="Дмитро і Іванна" loading="lazy" />
  </section>

  <!-- ═══════════  TIMING  ═══════════ -->
  <section id="timing">

    <p class="timing-date">12 | 06 | 2026</p>
    <h2 class="timing-title">Timing</h2>

    <div class="timeline">

      <!-- 10:00 -->
      <div class="event">
        <span class="event-time">10:00</span>
        <p class="event-name">Церемонія розпису</p>
        <p class="event-address-label">Адреса</p>
        <p class="event-address">
          <a href="https://maps.app.goo.gl/2eesPVpBnE1YnESw8" target="_blank" rel="noopener noreferrer">
            Печерський відділ ДРАЦС у м. Києві<br>вул. Цитадельна, 7/10
          </a>
        </p>
      </div>

      <div class="event-divider"></div>

      <!-- 12:00 -->
      <div class="event">
        <span class="event-time">12:00</span>
        <p class="event-name">Фотосесія</p>
      </div>

      <div class="event-divider"></div>

      <!-- 14:00 -->
      <div class="event">
        <span class="event-time">14:00</span>
        <p class="event-name">Святковий банкет</p>
        <p class="event-address-label">Адреса</p>
        <p class="event-address">
          <a href="https://maps.app.goo.gl/VQRhQxKyFxk7zZcMA" target="_blank" rel="noopener noreferrer">
            Ресторан «Замок Видубичі»<br>м. Київ, Набережно-Печерська дорога, 5
          </a>
        </p>
      </div>

    </div>

    <p class="timing-quote">Кольори у яких починається наша історія</p>

  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.event, .timing-quote').forEach(el => observer.observe(el));
  </script>

</body>
</html>
