<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дмитро & Іванна — Весілля</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & globals ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; background: #fff; font-family: 'Josefin Sans', sans-serif; }

    /* ── Hero ─────────────────────────────────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Background image — full bleed, cover */
    #hero .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
    }

    /* Soft dark overlay for text readability */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.18) 40%,
        rgba(0,0,0,0.18) 60%,
        rgba(0,0,0,0.45) 100%
      );
      z-index: 1;
    }

    /* ── Content layer ───────────────────────────────────────────── */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Typography ──────────────────────────────────────────────── */
    .hero-subtitle {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 2.2vw, 0.85rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.3s;
    }

    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: clamp(3.2rem, 13vw, 7.5rem);
      line-height: 1.15;
      color: #fff;
      text-shadow: 0 2px 30px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.6s;
    }

    .hero-ampersand {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.8rem, 7vw, 3.8rem);
      color: rgba(255,255,255,0.75);
      margin: -4px 0 -2px;
      opacity: 0;
      animation: fadeUp 1.3s ease forwards 0.8s;
    }

    .hero-name-second {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: clamp(3.2rem, 13vw, 7.5rem);
      line-height: 1.15;
      color: #fff;
      text-shadow: 0 2px 30px rgba(0,0,0,0.3);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 1s;
    }

    /* Decorative line */
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.2s;
    }
    .hero-divider span {
      display: block;
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.4);
    }
    .hero-divider-dot {
      width: 5px !important;
      height: 5px !important;
      border-radius: 50%;
      background: rgba(255,255,255,0.6) !important;
    }

    /* Date row */
    .hero-date {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.4s;
    }
    .hero-date-word {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 2.2vw, 0.85rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      padding: 0 14px;
      position: relative;
    }
    .hero-date-number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      line-height: 1;
      color: #fff;
      padding: 0 18px;
      position: relative;
    }
    /* Thin lines beside the number */
    .hero-date-number::before,
    .hero-date-number::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.35);
    }
    .hero-date-number::before { right: 100%; }
    .hero-date-number::after  { left: 100%; }

    /* ── Scroll cue ──────────────────────────────────────────────── */
    @keyframes bounce-cue {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50%      { transform: translateY(8px); opacity: 1; }
    }
    .scroll-cue {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      cursor: pointer;
      animation: bounce-cue 2.2s ease-in-out infinite;
    }

    /* ── Entrance animation ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- ═══════════════  HERO  ═══════════════ -->
  <section id="hero">

    <!-- Background photo -->
    <img
      class="hero-bg"
      src="img/hero-bg.jpg"
      alt="Весільне фото"
      loading="eager"
      fetchpriority="high"
    />

    <!-- Text overlay -->
    <div class="hero-content">

      <p class="hero-subtitle">Welcome to the Wedding of</p>

      <h1 class="hero-names">Дмитро</h1>
      <span class="hero-ampersand">&amp;</span>
      <h1 class="hero-name-second">Іванна</h1>

      <div class="hero-divider">
        <span></span>
        <span class="hero-divider-dot"></span>
        <span></span>
      </div>

      <div class="hero-date">
        <span class="hero-date-word">П'ятниця</span>
        <span class="hero-date-number">12</span>
        <span class="hero-date-word">Червня</span>
      </div>

    </div>

    <!-- Scroll cue -->
    <div class="scroll-cue" onclick="document.getElementById('next').scrollIntoView({behavior:'smooth'})">
      <svg xmlns="http://www.w3.org/2000/svg"
           width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

  </section>

  <!-- Placeholder section for scroll testing -->
  <section id="next" style="height:100vh; background:#fff;"></section>

</body>
</html>
