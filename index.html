<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дмитро & Іванна — Весілля</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; background: #fff; }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
    }

    #hero .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
    }

    @keyframes bounce-cue {
      0%, 100% { transform: translate(-50%, 0);   opacity: 0.65; }
      50%       { transform: translate(-50%, 9px); opacity: 1;    }
    }
    .scroll-cue {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      cursor: pointer;
      animation: bounce-cue 2.2s ease-in-out infinite;
    }
  </style>
</head>

<body>

  <!-- ═══════════════  HERO  ═══════════════ -->
  <section id="hero">

    <!-- Background photo -->
    <img
      class="hero-bg"
      src="img/hero-bg.jpg"
      alt="Весільне фото"
      loading="eager"
      fetchpriority="high"
    />

    <!-- Scroll cue -->
    <div class="scroll-cue" onclick="document.getElementById('next').scrollIntoView({behavior:'smooth'})">
      <svg xmlns="http://www.w3.org/2000/svg"
           width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

  </section>

  <!-- Placeholder section for scroll testing -->
  <section id="next" style="height:100vh; background:#fff;"></section>

</body>
</html>
